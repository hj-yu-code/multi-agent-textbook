<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900"
     font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e7b30"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="900" fill="#ffffff"/>

  <!-- 제목 -->
  <text x="300" y="36" text-anchor="middle" font-size="16" font-weight="700"
        fill="#212529" letter-spacing="0.5">인간-에이전트 협업 검증 프로세스</text>
  <text x="300" y="54" text-anchor="middle" font-size="10" fill="#868e96">
    Activity Diagram — 자동 검증 + 에스컬레이션 + 인간 체크포인트
  </text>

  <!-- ── 시작 노드 ── -->
  <circle cx="300" cy="90" r="14" fill="#495057"/>
  <line x1="300" y1="104" x2="300" y2="128"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 에이전트 실행 박스 (Blue) -->
  <rect x="140" y="128" width="320" height="72" rx="6" fill="#f5f0eb"/>
  <rect x="140" y="128" width="320" height="28" rx="6" fill="#dbe4ff"/>
  <rect x="140" y="148" width="320" height="8" fill="#dbe4ff"/>
  <line x1="140" y1="156" x2="460" y2="156" stroke="#364fc7" stroke-width="1"/>
  <rect x="140" y="128" width="320" height="72" rx="6" fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="300" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">에이전트 실행</text>
  <text x="300" y="172" text-anchor="middle" font-size="11" fill="#495057">코드 생성 · 파일 수정 · API 호출</text>
  <text x="300" y="188" text-anchor="middle" font-size="10" fill="#868e96">Claude Agent 자율 실행</text>

  <!-- 화살표: 에이전트 → 자동 검증 -->
  <line x1="300" y1="200" x2="300" y2="224"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 자동 검증 박스 (Blue) -->
  <rect x="140" y="224" width="320" height="72" rx="6" fill="#f5f0eb"/>
  <rect x="140" y="224" width="320" height="28" rx="6" fill="#dbe4ff"/>
  <rect x="140" y="244" width="320" height="8" fill="#dbe4ff"/>
  <line x1="140" y1="252" x2="460" y2="252" stroke="#364fc7" stroke-width="1"/>
  <rect x="140" y="224" width="320" height="72" rx="6" fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="300" y="244" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">자동 검증</text>
  <text x="300" y="268" text-anchor="middle" font-size="11" fill="#495057">테스트 실행 · Lint · 정적 분석</text>
  <text x="300" y="284" text-anchor="middle" font-size="10" fill="#868e96">CI 파이프라인 자동화</text>

  <!-- 화살표: 자동 검증 → 통과? -->
  <line x1="300" y1="296" x2="300" y2="326"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 다이아몬드: 자동 검증 통과? (Amber) -->
  <polygon points="300,326 400,358 300,390 200,358" fill="#fff3bf" stroke="#e67700" stroke-width="1.5"/>
  <text x="300" y="354" text-anchor="middle" font-size="12" font-weight="600" fill="#212529">자동 검증</text>
  <text x="300" y="369" text-anchor="middle" font-size="12" font-weight="600" fill="#212529">통과?</text>

  <!-- No 분기: 왼쪽 → 에이전트 재실행 -->
  <path d="M 200,358 L 80,358 L 80,164 L 140,164"
        fill="none" stroke="#c92a2a" stroke-width="1.5"
        marker-end="url(#arrow-rose)"/>
  <text x="120" y="351" font-size="10" fill="#c92a2a">No</text>
  <!-- 루프 레이블 -->
  <rect x="20" y="280" width="56" height="20" rx="4" fill="#ffe3e3" stroke="#c92a2a" stroke-width="0.75"/>
  <text x="48" y="294" text-anchor="middle" font-size="9" font-weight="600" fill="#c92a2a">자동 루프</text>

  <!-- Yes 분기: 아래 → 에스컬레이션 조건? -->
  <line x1="300" y1="390" x2="300" y2="420"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="312" y="410" font-size="10" fill="#495057">Yes</text>

  <!-- 다이아몬드: 에스컬레이션 조건? (Amber) -->
  <polygon points="300,420 420,462 300,504 180,462" fill="#fff3bf" stroke="#e67700" stroke-width="1.5"/>
  <text x="300" y="452" text-anchor="middle" font-size="12" font-weight="600" fill="#212529">에스컬레이션</text>
  <text x="300" y="467" text-anchor="middle" font-size="12" font-weight="600" fill="#212529">조건?</text>

  <!-- 에스컬레이션 조건 어노테이션 (오른쪽 사이드) -->
  <rect x="490" y="428" width="96" height="68" rx="4"
        fill="#fff3bf" stroke="#e67700" stroke-width="0.75"/>
  <text x="538" y="446" text-anchor="middle" font-size="9" font-weight="600" fill="#e67700">조건 기준</text>
  <text x="498" y="462" font-size="9" fill="#495057">• 비용 $100+</text>
  <text x="498" y="476" font-size="9" fill="#495057">• 파일 50개+</text>
  <text x="498" y="490" font-size="9" fill="#495057">• 외부 API 10+</text>
  <!-- 점선 커넥터 -->
  <line x1="420" y1="462" x2="490" y2="462"
        stroke="#e67700" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- No 분기 (안전): 왼쪽 → 다음 단계 (초록) -->
  <path d="M 180,462 L 80,462 L 80,720 L 140,720"
        fill="none" stroke="#1e7b30" stroke-width="1.5"
        marker-end="url(#arrow-green)"/>
  <text x="115" y="455" font-size="10" fill="#1e7b30">No</text>
  <text x="40" y="594" text-anchor="middle" font-size="10" fill="#868e96" font-style="italic" transform="rotate(-90,40,594)">안전 (자동 진행)</text>

  <!-- Yes 분기 (위험): 아래 → 인간 체크포인트 -->
  <line x1="300" y1="504" x2="300" y2="528"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="312" y="520" font-size="10" fill="#495057">Yes</text>

  <!-- 인간 검토 체크포인트 (Green) -->
  <rect x="120" y="528" width="360" height="80" rx="6" fill="#d3f9d8"/>
  <rect x="120" y="528" width="360" height="28" rx="6" fill="#d3f9d8"/>
  <rect x="120" y="548" width="360" height="8" fill="#d3f9d8"/>
  <line x1="120" y1="556" x2="480" y2="556" stroke="#1e7b30" stroke-width="1"/>
  <rect x="120" y="528" width="360" height="80" rx="6" fill="none" stroke="#1e7b30" stroke-width="1.5"/>
  <!-- 사람 아이콘 -->
  <circle cx="152" cy="576" r="8" fill="none" stroke="#1e7b30" stroke-width="1.5"/>
  <path d="M 144,600 Q 152,588 160,600" fill="none" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="300" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">인간 검토 체크포인트</text>
  <text x="300" y="576" text-anchor="middle" font-size="11" fill="#495057">담당자 코드 리뷰 · 변경 내용 확인</text>
  <text x="300" y="592" text-anchor="middle" font-size="11" fill="#495057">비용 · 영향 범위 · 외부 연동 검토</text>
  <text x="300" y="604" text-anchor="middle" font-size="10" fill="#868e96">HITL (Human-in-the-Loop)</text>

  <!-- 화살표: 인간 체크 → 승인? -->
  <line x1="300" y1="608" x2="300" y2="638"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 다이아몬드: 승인? (Amber) -->
  <polygon points="300,638 390,666 300,694 210,666" fill="#fff3bf" stroke="#e67700" stroke-width="1.5"/>
  <text x="300" y="662" text-anchor="middle" font-size="12" font-weight="600" fill="#212529">승인?</text>
  <text x="300" y="677" text-anchor="middle" font-size="10" fill="#e67700">인간 최종 판단</text>

  <!-- Yes 분기: 아래 → 다음 단계 -->
  <line x1="300" y1="694" x2="300" y2="718"
        stroke="#1e7b30" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="312" y="710" font-size="10" fill="#495057">Yes</text>

  <!-- 다음 단계 진행 (Green) -->
  <rect x="140" y="718" width="320" height="56" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="300" y="746" text-anchor="middle" font-size="13" font-weight="600" fill="#1e7b30">다음 단계 진행</text>
  <text x="300" y="762" text-anchor="middle" font-size="11" fill="#495057">승인 완료 · 배포 / 머지 진행</text>

  <!-- No 분기 (거부): 오른쪽 → 수정 요청 -->
  <path d="M 390,666 L 500,666 L 500,800 L 460,800"
        fill="none" stroke="#c92a2a" stroke-width="1.5"
        marker-end="url(#arrow-rose)"/>
  <text x="445" y="659" font-size="10" fill="#c92a2a">No</text>

  <!-- 수정 요청 박스 (Rose) -->
  <rect x="140" y="776" width="320" height="56" rx="6" fill="#ffe3e3"/>
  <rect x="140" y="776" width="320" height="28" rx="6" fill="#ffe3e3"/>
  <rect x="140" y="796" width="320" height="8" fill="#ffe3e3"/>
  <line x1="140" y1="804" x2="460" y2="804" stroke="#c92a2a" stroke-width="1"/>
  <rect x="140" y="776" width="320" height="56" rx="6" fill="none" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="300" y="796" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">수정 요청 → 에이전트</text>
  <text x="300" y="820" text-anchor="middle" font-size="11" fill="#495057">피드백 전달 · 재실행 지시</text>

  <!-- 수정 요청 → 에이전트 실행 루프백 -->
  <path d="M 140,804 L 60,804 L 60,164 L 140,164"
        fill="none" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="6,3"
        marker-end="url(#arrow-rose)"/>

  <!-- 종료 노드 -->
  <circle cx="300" cy="870" r="14" fill="#ffffff" stroke="#1e7b30" stroke-width="3"/>
  <circle cx="300" cy="870" r="9" fill="#1e7b30"/>
  <line x1="300" y1="774" x2="300" y2="844" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="300" y1="844" x2="300" y2="856" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="890" text-anchor="middle" font-size="10" fill="#868e96">프로세스 완료</text>
</svg>
