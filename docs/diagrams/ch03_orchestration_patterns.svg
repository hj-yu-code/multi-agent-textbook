  <line x1="380" y1="86" x2="380" y2="102" stroke="#868e96" stroke-width="1.5"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="485" y1="86" x2="485" y2="102" stroke="#868e96" stroke-width="1.5"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <text x="36" y="72" font-size="12" font-weight="600" fill="#212529">5.1 블랙보드</text>
  <text x="36" y="90" font-size="10" fill="#5a6268">자율적 참여 결정</text>
  <text x="36" y="108" font-size="10" font-weight="600" fill="#1e7b30">▲ 13~57% 향상</text>
  <text x="548" y="119" font-size="9" fill="#5a6268" font-style="italic">자율 참여</text>

  <!-- ===== 5.2 멀티에이전트 토론 ===== -->
  <rect x="20" y="164" width="740" height="100" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="174" x2="195" y2="254" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <rect x="230" y="180" width="60" height="22" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1"/>
  <rect x="360" y="180" width="60" height="22" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1"/>
  <rect x="490" y="180" width="60" height="22" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1"/>
