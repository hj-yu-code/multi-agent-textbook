  <line x1="390" y1="202" x2="390" y2="228" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="350" y="230" width="80" height="22" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="390" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7b30">합의</text>

  <text x="36" y="188" font-size="12" font-weight="600" fill="#212529">5.2 멀티에이전트 토론</text>
  <text x="36" y="206" font-size="10" fill="#5a6268">비판/반론 → 합의 수렴</text>
  <text x="36" y="224" font-size="10" font-weight="600" fill="#1e7b30">▲ 환각 감소</text>

  <!-- ===== 5.3 다중 에이전트 리플렉션 ===== -->
  <rect x="20" y="280" width="740" height="100" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="290" x2="195" y2="370" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <rect x="210" y="298" width="60" height="22" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
