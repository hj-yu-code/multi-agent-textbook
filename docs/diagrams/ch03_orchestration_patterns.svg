  <line x1="570" y1="439" x2="608" y2="439" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="610" y="426" width="60" height="26" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
