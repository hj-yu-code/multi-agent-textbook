  <line x1="300" y1="560" x2="348" y2="560" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="572" x2="348" y2="590" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="350" y="518" width="80" height="22" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="350" y="548" width="80" height="22" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="350" y="578" width="80" height="22" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <text x="390" y="533" text-anchor="middle" font-size="9" fill="#e67700">기술 지원</text>
  <text x="390" y="563" text-anchor="middle" font-size="9" fill="#e67700">결제 담당</text>
  <text x="390" y="593" text-anchor="middle" font-size="9" fill="#e67700">계정 관리</text>
  <text x="456" y="541" font-size="9" fill="#5a6268" font-style="italic">transfer_to()</text>

  <text x="36" y="536" font-size="12" font-weight="600" fill="#212529">5.5 핸드오프</text>
  <text x="36" y="554" font-size="10" fill="#5a6268">동적 제어권 이전</text>
  <text x="36" y="572" font-size="10" font-weight="600" fill="#1e7b30">▲ Swarm/Agents SDK</text>

  <!-- ===== 5.6 매그네틱원 ===== -->
  <rect x="20" y="628" width="740" height="100" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="638" x2="195" y2="718" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <rect x="325" y="640" width="110" height="26" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
  <text x="380" y="657" text-anchor="middle" font-size="10" font-weight="600" fill="#364fc7">Manager (Ledger)</text>
  <!-- Dynamic selection arrows -->
  <line x1="325" y1="666" x2="260" y2="690" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="666" x2="380" y2="688" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="435" y1="666" x2="500" y2="690" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="220" y="690" width="70" height="20" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="346" y="690" width="70" height="20" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="470" y="690" width="70" height="20" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <text x="255" y="704" text-anchor="middle" font-size="9" fill="#e67700">WebSurfer</text>
  <text x="381" y="704" text-anchor="middle" font-size="9" fill="#e67700">Coder</text>
  <text x="505" y="704" text-anchor="middle" font-size="9" fill="#e67700">FileSurfer</text>
  <text x="560" y="670" font-size="9" fill="#5a6268" font-style="italic">동적 선택</text>

  <text x="36" y="652" font-size="12" font-weight="600" fill="#212529">5.6 매그네틱원</text>
  <text x="36" y="670" font-size="10" fill="#5a6268">Ledger 기반 동적 조율</text>
  <text x="36" y="688" font-size="10" font-weight="600" fill="#1e7b30">▲ GAIA 38%</text>

  <!-- Summary -->
  <rect x="20" y="748" width="740" height="28" rx="6"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="390" y="766" text-anchor="middle" font-size="11"
        font-weight="600" fill="#1e7b30">핵심: 정적 할당 → 자율 참여/토론/동적 조율로 진화</text>
</svg>