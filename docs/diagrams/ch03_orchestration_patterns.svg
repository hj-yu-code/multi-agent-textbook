  <text x="36" y="420" font-size="12" font-weight="600" fill="#212529">5.4 계획-실행 분리</text>
  <text x="36" y="438" font-size="10" fill="#5a6268">Planner → DAG → Executor</text>
  <text x="36" y="456" font-size="10" font-weight="600" fill="#1e7b30">▲ WebArena 57.58%</text>

  <!-- ===== 5.5 핸드오프 ===== -->
  <rect x="20" y="512" width="740" height="100" rx="6"
