<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 796" width="780" height="796"
     font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
  </defs>
  <rect width="780" height="796" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700"
        fill="#212529" letter-spacing="0.5">오케스트레이션 패턴 비교 (섹션 5)</text>

  <!-- ===== 5.1 블랙보드 ===== -->
  <rect x="20" y="48" width="740" height="100" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="58" x2="195" y2="138" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- Blackboard box -->
  <rect x="280" y="58" width="200" height="28" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1.5"/>
  <text x="380" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#e67700">블랙보드 (공유 공간)</text>
  <!-- Agents -->
  <rect x="240" y="104" width="70" height="22" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1"/>
  <rect x="345" y="104" width="70" height="22" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1"/>
  <rect x="450" y="104" width="70" height="22" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1"/>
  <text x="275" y="119" text-anchor="middle" font-size="10" fill="#364fc7">Agent 1</text>
  <text x="380" y="119" text-anchor="middle" font-size="10" fill="#364fc7">Agent 2</text>
  <text x="485" y="119" text-anchor="middle" font-size="10" fill="#364fc7">Agent 3</text>
  <!-- Bidirectional arrows -->
  <line x1="275" y1="86" x2="275" y2="102" stroke="#868e96" stroke-width="1.5"
