<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 450" width="880" height="450"
     font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#364fc7"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67700"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e7b30"/>
    </marker>
  </defs>
  <rect width="880" height="450" fill="#ffffff"/>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" font-size="16" font-weight="700"
        fill="#212529" letter-spacing="0.5">OMC 3-Tier 모델 라우팅</text>

  <!-- ====== CONNECTIONS (painted first) ====== -->

  <!-- Query → Diamond -->
  <line x1="120" y1="220" x2="198" y2="220"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond → Opus (High, top) -->
  <path d="M 260,194 L 260,110 L 468,110"
        fill="none" stroke="#364fc7" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="310" y="100" font-size="10" font-weight="400" fill="#364fc7">높음 (High)</text>

  <!-- Diamond → Sonnet (Medium, middle) -->
  <line x1="286" y1="220" x2="468" y2="220"
        stroke="#e67700" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="370" y="212" text-anchor="middle" font-size="10" font-weight="400" fill="#e67700">보통 (Medium)</text>

  <!-- Diamond → Haiku (Low, bottom) -->
  <path d="M 260,246 L 260,330 L 468,330"
        fill="none" stroke="#1e7b30" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="310" y="340" font-size="10" font-weight="400" fill="#1e7b30">낮음 (Low)</text>

  <!-- Opus → Result -->
  <line x1="710" y1="110" x2="738" y2="110"
        stroke="#868e96" stroke-width="1.5"/>
  <!-- Sonnet → Result -->
  <line x1="710" y1="220" x2="738" y2="220"
        stroke="#868e96" stroke-width="1.5"/>
  <!-- Haiku → Result -->
  <line x1="710" y1="330" x2="738" y2="330"
        stroke="#868e96" stroke-width="1.5"/>

  <!-- Merge lines to Result -->
  <line x1="740" y1="110" x2="740" y2="330"
        stroke="#868e96" stroke-width="1.5"/>
  <line x1="740" y1="220" x2="768" y2="220"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== NODES (painted on top) ====== -->

  <!-- Query input box -->
  <rect x="20" y="192" width="100" height="56" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"/>
  <text x="70" y="215" text-anchor="middle" font-size="13"
        font-weight="600" fill="#212529">쿼리</text>
  <text x="70" y="233" text-anchor="middle" font-size="10"
        fill="#495057">사용자 입력</text>

  <!-- Decision diamond -->
  <polygon points="242,194 286,220 242,246 198,220"
           fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"/>
  <text x="242" y="216" text-anchor="middle" font-size="9"
        font-weight="600" fill="#6b6560">복잡도</text>
  <text x="242" y="228" text-anchor="middle" font-size="9"
        font-weight="600" fill="#6b6560">판단</text>

  <!-- Opus box (Blue) - High complexity -->
  <rect x="470" y="60" width="240" height="100" rx="6" fill="#f5f0eb"/>
  <rect x="470" y="60" width="240" height="28" rx="6" fill="#dbe4ff"/>
  <rect x="470" y="80" width="240" height="8" fill="#dbe4ff"/>
  <line x1="470" y1="88" x2="710" y2="88" stroke="#364fc7" stroke-width="1"/>
  <rect x="470" y="60" width="240" height="100" rx="6"
        fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="590" y="80" text-anchor="middle" font-size="13"
        font-weight="600" fill="#364fc7">Opus</text>
  <text x="486" y="108" font-size="11" fill="#495057">- 아키텍처 설계</text>
  <text x="486" y="124" font-size="11" fill="#495057">- 복합 분석 및 추론</text>
  <text x="486" y="140" font-size="11" fill="#495057">- 코드 비판 및 리팩터링 판단</text>

  <!-- Sonnet box (Amber) - Medium complexity -->
  <rect x="470" y="170" width="240" height="100" rx="6" fill="#f5f0eb"/>
  <rect x="470" y="170" width="240" height="28" rx="6" fill="#fff3bf"/>
  <rect x="470" y="190" width="240" height="8" fill="#fff3bf"/>
  <line x1="470" y1="198" x2="710" y2="198" stroke="#e67700" stroke-width="1"/>
  <rect x="470" y="170" width="240" height="100" rx="6"
        fill="none" stroke="#e67700" stroke-width="1.5"/>
  <text x="590" y="190" text-anchor="middle" font-size="13"
        font-weight="600" fill="#e67700">Sonnet</text>
  <text x="486" y="218" font-size="11" fill="#495057">- 기능 구현 및 코딩</text>
  <text x="486" y="234" font-size="11" fill="#495057">- 코드 리뷰</text>
  <text x="486" y="250" font-size="11" fill="#495057">- 테스트 작성 및 실행</text>

  <!-- Haiku box (Green/Gray) - Low complexity -->
  <rect x="470" y="280" width="240" height="100" rx="6" fill="#f5f0eb"/>
  <rect x="470" y="280" width="240" height="28" rx="6" fill="#d3f9d8"/>
  <rect x="470" y="300" width="240" height="8" fill="#d3f9d8"/>
  <line x1="470" y1="308" x2="710" y2="308" stroke="#1e7b30" stroke-width="1"/>
  <rect x="470" y="280" width="240" height="100" rx="6"
        fill="none" stroke="#6b6560" stroke-width="1.5"/>
  <text x="590" y="300" text-anchor="middle" font-size="13"
        font-weight="600" fill="#1e7b30">Haiku</text>
  <text x="486" y="328" font-size="11" fill="#495057">- 파일 탐색 및 검색</text>
  <text x="486" y="344" font-size="11" fill="#495057">- 정보 조회</text>
  <text x="486" y="360" font-size="11" fill="#495057">- 간단한 편집 작업</text>

  <!-- Result output box -->
  <rect x="770" y="192" width="90" height="56" rx="6"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="815" y="215" text-anchor="middle" font-size="13"
        font-weight="600" fill="#1e7b30">결과</text>
  <text x="815" y="233" text-anchor="middle" font-size="10"
        fill="#495057">응답 출력</text>

  <!-- Legend -->
  <text x="20" y="410" font-size="10" font-weight="600" fill="#6b6560">라우팅 기준:</text>
  <text x="20" y="426" font-size="10" fill="#495057">작업 복잡도에 따라 최적 모델을 자동 선택하여 비용 효율과 품질을 균형 있게 조절</text>
</svg>