  <text x="96" y="380" font-size="10" font-weight="600" fill="#6b6560">Rig (git worktree #1)</text>
  <rect x="96" y="390" width="148" height="64" rx="6" fill="#f5f0eb"/>
  <rect x="96" y="390" width="148" height="28" rx="6" fill="#f5f0eb"/>
  <rect x="96" y="410" width="148" height="8" fill="#f5f0eb"/>
  <line x1="96" y1="418" x2="244" y2="418" stroke="#6b6560" stroke-width="1"/>
