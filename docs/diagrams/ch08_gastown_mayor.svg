        fill="none" stroke="#6b6560" stroke-width="1.5"/>
  <text x="170" y="408" text-anchor="middle" font-size="12"
        font-weight="600" fill="#212529">Polecat #1</text>
  <text x="112" y="438" font-size="10" fill="#495057">Worker</text>
  <!-- MEDIUM badge -->
  <rect x="152" y="438" width="64" height="14" rx="4"
        fill="#fff3bf" stroke="#e67700" stroke-width="0.75"/>
  <text x="184" y="448" text-anchor="middle" font-size="8"
        font-weight="600" fill="#e67700">MEDIUM</text>

  <!-- Polecat 2 (Gray) with Rig -->
  <rect x="300" y="360" width="180" height="130" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1"
        stroke-dasharray="6,3"/>
  <text x="316" y="380" font-size="10" font-weight="600" fill="#6b6560">Rig (git worktree #2)</text>
  <rect x="316" y="390" width="148" height="64" rx="6" fill="#f5f0eb"/>
  <rect x="316" y="390" width="148" height="28" rx="6" fill="#f5f0eb"/>
  <rect x="316" y="410" width="148" height="8" fill="#f5f0eb"/>
  <line x1="316" y1="418" x2="464" y2="418" stroke="#6b6560" stroke-width="1"/>
  <rect x="316" y="390" width="148" height="64" rx="6"
        fill="none" stroke="#6b6560" stroke-width="1.5"/>
  <text x="390" y="408" text-anchor="middle" font-size="12"
        font-weight="600" fill="#212529">Polecat #2</text>
  <text x="332" y="438" font-size="10" fill="#495057">Worker</text>
  <rect x="372" y="438" width="64" height="14" rx="4"
        fill="#fff3bf" stroke="#e67700" stroke-width="0.75"/>
  <text x="404" y="448" text-anchor="middle" font-size="8"
        font-weight="600" fill="#e67700">MEDIUM</text>

  <!-- Polecat 3 (Gray) with Rig -->
  <rect x="520" y="360" width="180" height="130" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1"
        stroke-dasharray="6,3"/>
  <text x="536" y="380" font-size="10" font-weight="600" fill="#6b6560">Rig (git worktree #3)</text>
  <rect x="536" y="390" width="148" height="64" rx="6" fill="#f5f0eb"/>
  <rect x="536" y="390" width="148" height="28" rx="6" fill="#f5f0eb"/>
  <rect x="536" y="410" width="148" height="8" fill="#f5f0eb"/>
  <line x1="536" y1="418" x2="684" y2="418" stroke="#6b6560" stroke-width="1"/>
  <rect x="536" y="390" width="148" height="64" rx="6"
        fill="none" stroke="#6b6560" stroke-width="1.5"/>
  <text x="610" y="408" text-anchor="middle" font-size="12"
        font-weight="600" fill="#212529">Polecat #3</text>
  <text x="552" y="438" font-size="10" fill="#495057">Worker</text>
  <rect x="592" y="438" width="64" height="14" rx="4"
        fill="#fff3bf" stroke="#e67700" stroke-width="0.75"/>
  <text x="624" y="448" text-anchor="middle" font-size="8"
        font-weight="600" fill="#e67700">MEDIUM</text>

  <!-- Deacon (Amber) - Right side -->
  <rect x="710" y="370" width="50" height="92" rx="6" fill="#fff3bf"/>
  <rect x="710" y="370" width="50" height="28" rx="6" fill="#fff3bf"/>
  <rect x="710" y="390" width="50" height="8" fill="#fff3bf"/>
  <line x1="710" y1="398" x2="760" y2="398" stroke="#e67700" stroke-width="1"/>
  <rect x="710" y="370" width="50" height="92" rx="6"
        fill="none" stroke="#e67700" stroke-width="1.5"/>
  <text x="735" y="388" text-anchor="middle" font-size="10"
        font-weight="600" fill="#e67700">Deacon</text>
  <text x="735" y="418" text-anchor="middle" font-size="9" fill="#495057">코드</text>
  <text x="735" y="432" text-anchor="middle" font-size="9" fill="#495057">품질</text>
  <text x="735" y="446" text-anchor="middle" font-size="9" fill="#495057">순찰</text>

  <!-- Refinery (Green) - Bottom -->
  <rect x="250" y="570" width="280" height="72" rx="6" fill="#d3f9d8"/>
  <rect x="250" y="570" width="280" height="28" rx="6" fill="#d3f9d8"/>
  <rect x="250" y="590" width="280" height="8" fill="#d3f9d8"/>
  <line x1="250" y1="598" x2="530" y2="598" stroke="#1e7b30" stroke-width="1"/>
  <rect x="250" y="570" width="280" height="72" rx="6"
        fill="none" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="390" y="588" text-anchor="middle" font-size="13"
        font-weight="600" fill="#1e7b30">Refinery</text>
  <text x="266" y="620" font-size="11" fill="#495057">머지 큐 &amp; 통합</text>

  <!-- Escalation Legend -->
