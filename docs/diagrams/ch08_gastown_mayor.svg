<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 762" width="780" height="762"
     font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#364fc7"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67700"/>
    </marker>
  </defs>
  <rect width="780" height="762" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="16" font-weight="700"
        fill="#212529" letter-spacing="0.5">Gas Town Mayor Pattern Architecture</text>

  <!-- ===== CONNECTIONS (drawn first per painter's model) ===== -->

  <!-- Overseer → Mayor (command) -->
  <line x1="390" y1="122" x2="390" y2="168"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mayor → Task Ledger (horizontal) -->
  <line x1="530" y1="206" x2="578" y2="206"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mayor → Polecat 1 -->
  <line x1="310" y1="240" x2="170" y2="358"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mayor → Polecat 2 -->
  <line x1="390" y1="240" x2="390" y2="358"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mayor → Polecat 3 -->
  <line x1="470" y1="240" x2="610" y2="358"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Polecat 1 → Refinery -->
  <line x1="170" y1="490" x2="330" y2="568"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Polecat 2 → Refinery -->
  <line x1="390" y1="490" x2="390" y2="568"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Polecat 3 → Refinery -->
  <line x1="610" y1="490" x2="450" y2="568"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Witness → Mayor (monitoring, dashed) -->
  <line x1="100" y1="206" x2="250" y2="206"
        stroke="#1e7b30" stroke-width="1.5" stroke-dasharray="6,3"
        marker-end="url(#arrow)"/>

  <!-- Witness → Polecats (monitoring arc, dashed) -->
  <path d="M 60,260 L 60,420 L 100,420"
        fill="none" stroke="#1e7b30" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Deacon → Polecat 2 (code quality patrol, dashed) -->
  <line x1="720" y1="420" x2="680" y2="420"
        stroke="#e67700" stroke-width="1.5" stroke-dasharray="6,3"
        marker-end="url(#arrow-amber)"/>

  <!-- Deacon → Refinery (dashed) -->
  <path d="M 720,440 L 720,590 L 530,590"
        fill="none" stroke="#e67700" stroke-width="1.5" stroke-dasharray="6,3"
        marker-end="url(#arrow-amber)"/>

  <!-- === ESCALATION ARROWS === -->
  <!-- CRITICAL → Overseer (Rose, from left side going up) -->
  <path d="M 100,360 L 40,360 L 40,94 L 250,94"
        fill="none" stroke="#c92a2a" stroke-width="1.5"
        marker-end="url(#arrow-rose)"/>
  <text x="48" y="230" font-size="10" font-weight="600" fill="#c92a2a">CRITICAL</text>

  <!-- HIGH → Mayor (Blue, from Polecat 2 going up) -->
  <path d="M 440,380 L 480,380 L 480,300 L 480,230 L 530,230"
        fill="none" stroke="#364fc7" stroke-width="1.5"
        marker-end="url(#arrow-blue)"/>
  <text x="488" y="310" font-size="10" font-weight="600" fill="#364fc7">HIGH</text>

  <!-- MEDIUM → handled by Polecat (self, amber badge) -->

  <!-- ===== BOXES (drawn after connections) ===== -->

  <!-- Overseer (Rose) - Top -->
  <rect x="250" y="50" width="280" height="72" rx="6" fill="#ffe3e3"/>
  <rect x="250" y="50" width="280" height="28" rx="6" fill="#ffe3e3"/>
  <rect x="250" y="70" width="280" height="8" fill="#ffe3e3"/>
  <line x1="250" y1="78" x2="530" y2="78" stroke="#c92a2a" stroke-width="1"/>
  <rect x="250" y="50" width="280" height="72" rx="6"
        fill="none" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="390" y="68" text-anchor="middle" font-size="13"
        font-weight="600" fill="#c92a2a">Overseer</text>
  <text x="266" y="100" font-size="11" fill="#495057">전체 감독 &amp; 최종 의사 결정</text>

  <!-- Mayor (Blue) - Middle -->
  <rect x="250" y="170" width="280" height="72" rx="6" fill="#dbe4ff"/>
  <rect x="250" y="170" width="280" height="28" rx="6" fill="#dbe4ff"/>
  <rect x="250" y="190" width="280" height="8" fill="#dbe4ff"/>
  <line x1="250" y1="198" x2="530" y2="198" stroke="#364fc7" stroke-width="1"/>
  <rect x="250" y="170" width="280" height="72" rx="6"
