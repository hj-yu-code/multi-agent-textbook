  <!-- HIGH -->
  <rect x="240" y="704" width="50" height="16" rx="4"
        fill="#dbe4ff" stroke="#364fc7" stroke-width="0.75"/>
  <text x="265" y="716" text-anchor="middle" font-size="10"
        font-weight="600" fill="#364fc7">HIGH</text>
  <text x="298" y="716" font-size="10" fill="#495057">→ Mayor</text>
  <!-- MEDIUM -->
  <rect x="420" y="704" width="64" height="16" rx="4"
        fill="#fff3bf" stroke="#e67700" stroke-width="0.75"/>
  <text x="452" y="716" text-anchor="middle" font-size="10"
        font-weight="600" fill="#e67700">MEDIUM</text>
  <text x="492" y="716" font-size="10" fill="#495057">→ Polecat (자체 처리)</text>
</svg>