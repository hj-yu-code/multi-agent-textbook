  <text x="266" y="220" font-size="11" fill="#495057">작업 분배 &amp; 스케줄링</text>

  <!-- Task Ledger / Beads DB (Amber) - Right of Mayor -->
  <rect x="580" y="170" width="160" height="72" rx="6" fill="#fff3bf"/>
  <rect x="580" y="170" width="160" height="28" rx="6" fill="#fff3bf"/>
  <rect x="580" y="190" width="160" height="8" fill="#fff3bf"/>
  <line x1="580" y1="198" x2="740" y2="198" stroke="#e67700" stroke-width="1"/>
  <rect x="580" y="170" width="160" height="72" rx="6"
