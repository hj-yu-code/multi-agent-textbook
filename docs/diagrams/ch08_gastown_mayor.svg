  <rect x="20" y="170" width="80" height="92" rx="6" fill="#d3f9d8"/>
  <rect x="20" y="170" width="80" height="28" rx="6" fill="#d3f9d8"/>
  <rect x="20" y="190" width="80" height="8" fill="#d3f9d8"/>
