        fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"
        stroke-dasharray="6,3"/>
  <text x="40" y="694" font-size="12" font-weight="600" fill="#6b6560">Escalation Policy</text>
  <!-- CRITICAL -->
  <rect x="40" y="704" width="70" height="16" rx="4"
        fill="#ffe3e3" stroke="#c92a2a" stroke-width="0.75"/>
  <text x="75" y="716" text-anchor="middle" font-size="10"
