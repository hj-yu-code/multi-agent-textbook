<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 596" width="780" height="596"
     font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e7b30"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
  </defs>
  <rect width="780" height="596" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700"
        fill="#212529" letter-spacing="0.5">품질 보증 패턴 비교</text>

  <!-- ===== Section 1: Evaluator-Optimizer ===== -->
  <rect x="20" y="48" width="740" height="110" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="58" x2="195" y2="148" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- S1 Lines -->
  <line x1="310" y1="82" x2="348" y2="82"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="82" x2="488" y2="82"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Pass arrow -->
  <line x1="590" y1="82" x2="638" y2="82"
        stroke="#1e7b30" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Fail loop-back -->
  <path d="M 540,96 L 540,128 L 290,128 L 290,96"
        fill="none" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="6,3"
        marker-end="url(#arrow-rose)"/>

  <!-- S1 Boxes -->
  <rect x="210" y="70" width="100" height="24" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1.5"/>
  <rect x="350" y="70" width="100" height="24" rx="6" fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"/>
  <rect x="490" y="70" width="100" height="24" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
  <rect x="640" y="70" width="56" height="24" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <!-- Pass/Fail badges -->
  <rect x="576" y="64" width="38" height="14" rx="4" fill="#d3f9d8" stroke="#1e7b30" stroke-width="0.75"/>
  <rect x="462" y="120" width="38" height="14" rx="4" fill="#ffe3e3" stroke="#c92a2a" stroke-width="0.75"/>

  <!-- S1 Text -->
  <text x="36" y="72" font-size="12" font-weight="600" fill="#212529">3.1 Evaluator-Optimizer</text>
  <text x="36" y="90" font-size="10" fill="#5a6268">생성(sonnet) → 평가(opus) 루프</text>
  <text x="36" y="108" font-size="10" font-weight="600" fill="#1e7b30">▲ 2회 반복으로 85% 개선</text>
  <text x="260" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#e67700">Generator</text>
  <text x="400" y="86" text-anchor="middle" font-size="10" fill="#6b6560">출력</text>
  <text x="540" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#364fc7">Evaluator</text>
  <text x="668" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7b30">최종</text>
  <text x="595" y="74" text-anchor="middle" font-size="8" font-weight="600" fill="#1e7b30">Pass</text>
  <text x="481" y="130" text-anchor="middle" font-size="8" font-weight="600" fill="#c92a2a">Fail</text>
  <text x="415" y="142" font-size="9" fill="#5a6268" font-style="italic">피드백 → 재시도 (최대 2회)</text>

  <!-- ===== Section 2: LLM-as-Judge ===== -->
  <rect x="20" y="174" width="740" height="110" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="184" x2="195" y2="274" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- S2 Lines -->
  <line x1="310" y1="224" x2="358" y2="224"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="224" x2="518" y2="224"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- S2 Boxes -->
  <rect x="210" y="212" width="100" height="24" rx="6" fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"/>
  <rect x="360" y="212" width="110" height="24" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
  <rect x="520" y="200" width="140" height="48" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>

  <!-- S2 Text -->
  <text x="36" y="198" font-size="12" font-weight="600" fill="#212529">3.2 LLM-as-Judge</text>
  <text x="36" y="216" font-size="10" fill="#5a6268">LLM 자동 품질 심사관</text>
  <text x="36" y="234" font-size="10" font-weight="600" fill="#1e7b30">▲ 인간 합의율 80% 일치</text>
  <text x="260" y="228" text-anchor="middle" font-size="10" fill="#6b6560">작업 결과</text>
  <text x="415" y="228" text-anchor="middle" font-size="10" font-weight="600" fill="#364fc7">Judge LLM</text>
  <text x="590" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7b30">Verdict JSON</text>
  <text x="590" y="236" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#495057">{ score, issues }</text>

  <!-- ===== Section 3: Mixture of Agents ===== -->
  <rect x="20" y="300" width="740" height="110" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="310" x2="195" y2="400" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- S3 Lines: fan-in -->
  <line x1="310" y1="327" x2="400" y2="327" stroke="#868e96" stroke-width="1.5"/>
  <line x1="310" y1="353" x2="400" y2="353" stroke="#868e96" stroke-width="1.5"/>
  <line x1="310" y1="379" x2="400" y2="379" stroke="#868e96" stroke-width="1.5"/>
  <line x1="400" y1="327" x2="400" y2="379" stroke="#868e96" stroke-width="1.5"/>
  <line x1="400" y1="353" x2="438" y2="353"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="353" x2="608" y2="353"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- S3 Boxes -->
  <rect x="210" y="316" width="100" height="22" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="210" y="342" width="100" height="22" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="210" y="368" width="100" height="22" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="440" y="340" width="120" height="26" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
  <rect x="610" y="340" width="80" height="26" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>

  <!-- S3 Text -->
  <text x="36" y="324" font-size="12" font-weight="600" fill="#212529">3.3 Mixture of Agents</text>
  <text x="36" y="342" font-size="10" fill="#5a6268">다수 Proposer → Aggregator</text>
  <text x="36" y="360" font-size="10" font-weight="600" fill="#1e7b30">▲ GPT-4o 대비 +8.2%</text>
  <text x="260" y="331" text-anchor="middle" font-size="10" fill="#e67700">Proposer A</text>
  <text x="260" y="357" text-anchor="middle" font-size="10" fill="#e67700">Proposer B</text>
  <text x="260" y="383" text-anchor="middle" font-size="10" fill="#e67700">Proposer C</text>
  <text x="500" y="357" text-anchor="middle" font-size="10" font-weight="600" fill="#364fc7">Aggregator</text>
  <text x="650" y="357" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7b30">최종</text>

  <!-- ===== Section 4: 다중 에이전트 평가 패널 ===== -->
  <rect x="20" y="426" width="740" height="110" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="436" x2="195" y2="526" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- S4 Lines: fan-out and fan-in -->
  <line x1="290" y1="472" x2="330" y2="472" stroke="#868e96" stroke-width="1.5"/>
  <line x1="330" y1="450" x2="330" y2="494" stroke="#868e96" stroke-width="1.5"/>
  <line x1="330" y1="450" x2="368" y2="450"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="472" x2="368" y2="472"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="494" x2="368" y2="494"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Fan-in to consensus -->
  <line x1="490" y1="450" x2="540" y2="450" stroke="#868e96" stroke-width="1.5"/>
  <line x1="490" y1="472" x2="540" y2="472" stroke="#868e96" stroke-width="1.5"/>
  <line x1="490" y1="494" x2="540" y2="494" stroke="#868e96" stroke-width="1.5"/>
  <line x1="540" y1="450" x2="540" y2="494" stroke="#868e96" stroke-width="1.5"/>
  <line x1="540" y1="472" x2="578" y2="472"
        stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- S4 Boxes -->
  <rect x="210" y="460" width="80" height="24" rx="6" fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"/>
  <rect x="370" y="438" width="120" height="24" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1"/>
  <rect x="370" y="460" width="120" height="24" rx="6" fill="#ffe3e3" stroke="#c92a2a" stroke-width="1"/>
  <rect x="370" y="482" width="120" height="24" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="580" y="460" width="100" height="24" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>

  <!-- S4 Text -->
  <text x="36" y="450" font-size="12" font-weight="600" fill="#212529">3.4 다중 에이전트 평가 패널</text>
  <text x="36" y="468" font-size="10" fill="#5a6268">다른 역할의 복수 심사관</text>
  <text x="36" y="486" font-size="10" font-weight="600" fill="#1e7b30">▲ 단일 Judge 대비 편향 감소</text>
  <text x="250" y="476" text-anchor="middle" font-size="10" fill="#6b6560">결과물</text>
  <text x="430" y="454" text-anchor="middle" font-size="10" fill="#364fc7">도메인 전문가</text>
  <text x="430" y="476" text-anchor="middle" font-size="10" fill="#c92a2a">비평가</text>
  <text x="430" y="498" text-anchor="middle" font-size="10" fill="#e67700">옹호자</text>
  <text x="630" y="476" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7b30">패널 합의</text>

  <!-- Summary -->
  <rect x="20" y="548" width="740" height="28" rx="6"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="390" y="566" text-anchor="middle" font-size="11"
        font-weight="600" fill="#1e7b30">핵심: 빠른 모델이 생성하고 비싼 모델이 검증 — 2회 반복이 최적 균형점</text>
</svg>