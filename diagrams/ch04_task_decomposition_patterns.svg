<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 448" width="780" height="448"
     font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
  </defs>
  <rect width="780" height="448" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700"
        fill="#212529" letter-spacing="0.5">작업 분해 패턴 비교 (섹션 6)</text>

  <!-- ===== 6.1 재귀적 스레드 ===== -->
  <rect x="20" y="48" width="740" height="100" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="58" x2="195" y2="138" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- Tree structure -->
  <rect x="340" y="58" width="80" height="22" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
  <text x="380" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#364fc7">Parent</text>
  <line x1="355" y1="80" x2="290" y2="98" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="405" y1="80" x2="470" y2="98" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="250" y="98" width="70" height="20" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="440" y="98" width="70" height="20" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <text x="285" y="112" text-anchor="middle" font-size="9" fill="#e67700">Child A</text>
  <text x="475" y="112" text-anchor="middle" font-size="9" fill="#e67700">Child B</text>
  <!-- Deeper recursion -->
  <line x1="265" y1="118" x2="240" y2="130" stroke="#868e96" stroke-width="1"/>
  <line x1="302" y1="118" x2="320" y2="130" stroke="#868e96" stroke-width="1"/>
  <rect x="218" y="130" width="44" height="14" rx="4" fill="#d3f9d8" stroke="#1e7b30" stroke-width="0.75"/>
  <rect x="300" y="130" width="44" height="14" rx="4" fill="#d3f9d8" stroke="#1e7b30" stroke-width="0.75"/>
  <text x="240" y="140" text-anchor="middle" font-size="7" fill="#1e7b30">A.1</text>
  <text x="322" y="140" text-anchor="middle" font-size="7" fill="#1e7b30">A.2</text>
  <text x="540" y="112" font-size="9" fill="#5a6268" font-style="italic">임의 깊이 재귀</text>

  <text x="36" y="72" font-size="12" font-weight="600" fill="#212529">6.1 재귀적 스레드 (THREAD)</text>
  <text x="36" y="90" font-size="10" fill="#5a6268">동적 자식 스레드 스폰</text>
  <text x="36" y="108" font-size="10" font-weight="600" fill="#1e7b30">▲ 10~50% 향상</text>

  <!-- ===== 6.2 스캐터-개더 ===== -->
  <rect x="20" y="164" width="740" height="100" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="174" x2="195" y2="254" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <rect x="210" y="200" width="80" height="26" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
  <text x="250" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#364fc7">Controller</text>
  <!-- Scatter -->
  <line x1="290" y1="200" x2="378" y2="186" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="213" x2="378" y2="213" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="226" x2="378" y2="240" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="380" y="176" width="60" height="18" rx="4" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="380" y="204" width="60" height="18" rx="4" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <rect x="380" y="232" width="60" height="18" rx="4" fill="#fff3bf" stroke="#e67700" stroke-width="1"/>
  <text x="410" y="189" text-anchor="middle" font-size="8" fill="#e67700">chunk 1</text>
  <text x="410" y="217" text-anchor="middle" font-size="8" fill="#e67700">chunk 2</text>
  <text x="410" y="245" text-anchor="middle" font-size="8" fill="#e67700">chunk 3</text>
  <!-- Gather -->
  <line x1="440" y1="186" x2="508" y2="200" stroke="#868e96" stroke-width="1.5"/>
  <line x1="440" y1="213" x2="508" y2="213" stroke="#868e96" stroke-width="1.5"/>
  <line x1="440" y1="240" x2="508" y2="226" stroke="#868e96" stroke-width="1.5"/>
  <line x1="508" y1="200" x2="508" y2="226" stroke="#868e96" stroke-width="1.5"/>
  <line x1="508" y1="213" x2="548" y2="213" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="550" y="200" width="80" height="26" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="590" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7b30">집계 결과</text>
  <text x="325" y="178" font-size="9" fill="#495057">scatter</text>
  <text x="480" y="196" font-size="9" fill="#495057">gather</text>

  <text x="36" y="188" font-size="12" font-weight="600" fill="#212529">6.2 스캐터-개더</text>
  <text x="36" y="206" font-size="10" fill="#5a6268">병렬 분배 → 동기 집계</text>
  <text x="36" y="224" font-size="10" font-weight="600" fill="#1e7b30">▲ 처리 시간 60~80% 단축</text>

  <!-- ===== 6.3 시장 기반 할당 ===== -->
  <rect x="20" y="280" width="740" height="100" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="195" y1="290" x2="195" y2="370" stroke="#6b6560" stroke-width="0.5" stroke-dasharray="3,2"/>

  <rect x="230" y="310" width="80" height="26" rx="6" fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"/>
  <text x="270" y="327" text-anchor="middle" font-size="10" fill="#6b6560">새 작업</text>
  <line x1="310" y1="323" x2="348" y2="323" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Auction -->
  <rect x="350" y="296" width="100" height="54" rx="6" fill="#fff3bf" stroke="#e67700" stroke-width="1.5"/>
  <text x="400" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="#e67700">경매</text>
  <text x="400" y="330" text-anchor="middle" font-size="9" fill="#e67700">A: $0.3 | B: $0.1</text>
  <text x="400" y="344" text-anchor="middle" font-size="9" fill="#e67700">C: $0.2</text>
  <line x1="450" y1="323" x2="488" y2="323" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="490" y="310" width="80" height="26" rx="6" fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="530" y="327" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7b30">낙찰: B</text>

  <text x="36" y="304" font-size="12" font-weight="600" fill="#212529">6.3 시장 기반 할당</text>
  <text x="36" y="322" font-size="10" fill="#5a6268">에이전트 입찰 → 낙찰</text>
  <text x="36" y="340" font-size="10" font-weight="600" fill="#1e7b30">▲ 동적 확장</text>

  <!-- Summary -->
  <rect x="20" y="400" width="740" height="28" rx="6"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="390" y="418" text-anchor="middle" font-size="11"
        font-weight="600" fill="#1e7b30">핵심: 복잡한 작업을 에이전트가 처리 가능한 단위로 자동 분할</text>
</svg>