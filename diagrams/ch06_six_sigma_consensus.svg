<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" width="720" height="760"
     font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e7b30"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#364fc7"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="720" height="760" fill="#ffffff"/>

  <!-- 제목 -->
  <text x="360" y="36" text-anchor="middle" font-size="16" font-weight="700"
        fill="#212529" letter-spacing="0.5">Six Sigma Agent 합의 투표</text>
  <text x="360" y="54" text-anchor="middle" font-size="10" fill="#868e96">N회 병렬 실행 → 임베딩 클러스터링 → 다수결 선택</text>

  <!-- 시작 노드 -->
  <circle cx="360" cy="84" r="14" fill="#495057"/>
  <circle cx="360" cy="84" r="6" fill="#ffffff"/>
  <line x1="360" y1="98" x2="360" y2="118" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 동일 작업 입력 -->
  <rect x="200" y="118" width="320" height="52" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"/>
  <text x="360" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">동일 작업</text>
  <text x="360" y="157" text-anchor="middle" font-size="11" fill="#495057">동일한 프롬프트 N회 실행 준비</text>

  <!-- Fan-out 화살표: 하나의 중심점에서 13개 병렬 실행으로 -->
  <!-- 중심 Fan-out 선 -->
  <line x1="360" y1="170" x2="360" y2="195" stroke="#868e96" stroke-width="1.5"/>
  <!-- 수평선 (팬아웃) -->
  <line x1="60" y1="195" x2="660" y2="195" stroke="#868e96" stroke-width="1"/>

  <!-- 13개 실행 박스 — 3개만 명시적으로, 나머지는 "..." 표시 -->
  <!-- 실행 1 -->
  <line x1="90" y1="195" x2="90" y2="215" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="50" y="215" width="80" height="52" rx="6" fill="#dbe4ff"/>
  <rect x="50" y="215" width="80" height="28" rx="6" fill="#364fc7"/>
  <rect x="50" y="235" width="80" height="8" fill="#364fc7"/>
  <line x1="50" y1="243" x2="130" y2="243" stroke="#364fc7" stroke-width="1"/>
  <rect x="50" y="215" width="80" height="52" rx="6" fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="90" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">실행 1</text>
  <text x="90" y="254" text-anchor="middle" font-size="10" fill="#495057">응답</text>
  <text x="90" y="266" text-anchor="middle" font-size="9" fill="#868e96">생성</text>

  <!-- 실행 2 -->
  <line x1="200" y1="195" x2="200" y2="215" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="160" y="215" width="80" height="52" rx="6" fill="#dbe4ff"/>
  <rect x="160" y="215" width="80" height="28" rx="6" fill="#364fc7"/>
  <rect x="160" y="235" width="80" height="8" fill="#364fc7"/>
  <line x1="160" y1="243" x2="240" y2="243" stroke="#364fc7" stroke-width="1"/>
  <rect x="160" y="215" width="80" height="52" rx="6" fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="200" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">실행 2</text>
  <text x="200" y="254" text-anchor="middle" font-size="10" fill="#495057">응답</text>
  <text x="200" y="266" text-anchor="middle" font-size="9" fill="#868e96">생성</text>

  <!-- 실행 3 -->
  <line x1="310" y1="195" x2="310" y2="215" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="270" y="215" width="80" height="52" rx="6" fill="#dbe4ff"/>
  <rect x="270" y="215" width="80" height="28" rx="6" fill="#364fc7"/>
  <rect x="270" y="235" width="80" height="8" fill="#364fc7"/>
  <line x1="270" y1="243" x2="350" y2="243" stroke="#364fc7" stroke-width="1"/>
  <rect x="270" y="215" width="80" height="52" rx="6" fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="310" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">실행 3</text>
  <text x="310" y="254" text-anchor="middle" font-size="10" fill="#495057">응답</text>
  <text x="310" y="266" text-anchor="middle" font-size="9" fill="#868e96">생성</text>

  <!-- 중간 "..." -->
  <text x="410" y="248" text-anchor="middle" font-size="18" fill="#868e96">···</text>

  <!-- 실행 N-1 -->
  <line x1="520" y1="195" x2="520" y2="215" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="480" y="215" width="80" height="52" rx="6" fill="#dbe4ff"/>
  <rect x="480" y="215" width="80" height="28" rx="6" fill="#364fc7"/>
  <rect x="480" y="235" width="80" height="8" fill="#364fc7"/>
  <line x1="480" y1="243" x2="560" y2="243" stroke="#364fc7" stroke-width="1"/>
  <rect x="480" y="215" width="80" height="52" rx="6" fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="520" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">실행 12</text>
  <text x="520" y="254" text-anchor="middle" font-size="10" fill="#495057">응답</text>
  <text x="520" y="266" text-anchor="middle" font-size="9" fill="#868e96">생성</text>

  <!-- 실행 N -->
  <line x1="630" y1="195" x2="630" y2="215" stroke="#868e96" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="590" y="215" width="80" height="52" rx="6" fill="#dbe4ff"/>
  <rect x="590" y="215" width="80" height="28" rx="6" fill="#364fc7"/>
  <rect x="590" y="235" width="80" height="8" fill="#364fc7"/>
  <line x1="590" y1="243" x2="670" y2="243" stroke="#364fc7" stroke-width="1"/>
  <rect x="590" y="215" width="80" height="52" rx="6" fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="630" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">실행 13</text>
  <text x="630" y="254" text-anchor="middle" font-size="10" fill="#495057">응답</text>
  <text x="630" y="266" text-anchor="middle" font-size="9" fill="#868e96">생성</text>

  <!-- Fan-in 화살표 → 임베딩 변환 -->
  <line x1="60" y1="275" x2="660" y2="275" stroke="#868e96" stroke-width="1"/>
  <line x1="90" y1="267" x2="90" y2="275" stroke="#868e96" stroke-width="1"/>
  <line x1="200" y1="267" x2="200" y2="275" stroke="#868e96" stroke-width="1"/>
  <line x1="310" y1="267" x2="310" y2="275" stroke="#868e96" stroke-width="1"/>
  <line x1="520" y1="267" x2="520" y2="275" stroke="#868e96" stroke-width="1"/>
  <line x1="630" y1="267" x2="630" y2="275" stroke="#868e96" stroke-width="1"/>
  <line x1="360" y1="275" x2="360" y2="295" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 임베딩 변환 박스 (y=295, h=52) -->
  <rect x="200" y="295" width="320" height="52" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1.5"/>
  <text x="360" y="317" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">임베딩 변환</text>
  <text x="360" y="335" text-anchor="middle" font-size="11" fill="#495057">13개 응답 → 벡터 공간 변환</text>

  <!-- → 의미 클러스터링 -->
  <line x1="360" y1="347" x2="360" y2="367" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 의미 클러스터링 컨테이너 (y=367, h=160) -->
  <rect x="60" y="367" width="600" height="160" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="360" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#6b6560">의미 클러스터링</text>

  <!-- 클러스터 A (Green - 다수) -->
  <rect x="90" y="398" width="160" height="112" rx="6" fill="#d3f9d8"/>
  <rect x="90" y="398" width="160" height="28" rx="6" fill="#1e7b30"/>
  <rect x="90" y="418" width="160" height="8" fill="#1e7b30"/>
  <line x1="90" y1="426" x2="250" y2="426" stroke="#1e7b30" stroke-width="1"/>
  <rect x="90" y="398" width="160" height="112" rx="6" fill="none" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="170" y="417" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">클러스터 A</text>
  <text x="170" y="450" text-anchor="middle" font-size="22" font-weight="700" fill="#1e7b30">10/13</text>
  <text x="170" y="474" text-anchor="middle" font-size="10" fill="#495057">다수 — 핵심 답변 그룹</text>
  <text x="170" y="500" text-anchor="middle" font-size="10" fill="#868e96">의미적으로 일관됨</text>

  <!-- 클러스터 B (Amber - 소수) -->
  <rect x="280" y="398" width="160" height="112" rx="6" fill="#fff3bf"/>
  <rect x="280" y="398" width="160" height="28" rx="6" fill="#e67700"/>
  <rect x="280" y="418" width="160" height="8" fill="#e67700"/>
  <line x1="280" y1="426" x2="440" y2="426" stroke="#e67700" stroke-width="1"/>
  <rect x="280" y="398" width="160" height="112" rx="6" fill="none" stroke="#e67700" stroke-width="1.5"/>
  <text x="360" y="417" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">클러스터 B</text>
  <text x="360" y="450" text-anchor="middle" font-size="22" font-weight="700" fill="#e67700">2/13</text>
  <text x="360" y="474" text-anchor="middle" font-size="10" fill="#495057">소수 — 변형 답변 그룹</text>
  <text x="360" y="500" text-anchor="middle" font-size="10" fill="#868e96">부분적 일치</text>

  <!-- 클러스터 C (Rose - 이상치) -->
  <rect x="470" y="398" width="160" height="112" rx="6" fill="#ffe3e3"/>
  <rect x="470" y="398" width="160" height="28" rx="6" fill="#c92a2a"/>
  <rect x="470" y="418" width="160" height="8" fill="#c92a2a"/>
  <line x1="470" y1="426" x2="630" y2="426" stroke="#c92a2a" stroke-width="1"/>
  <rect x="470" y="398" width="160" height="112" rx="6" fill="none" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="550" y="417" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">클러스터 C</text>
  <text x="550" y="450" text-anchor="middle" font-size="22" font-weight="700" fill="#c92a2a">1/13</text>
  <text x="550" y="474" text-anchor="middle" font-size="10" fill="#495057">이상치 — 불일치 답변</text>
  <text x="550" y="500" text-anchor="middle" font-size="10" fill="#868e96">환각 가능성</text>

  <!-- 클러스터 → 다수결 화살표 -->
  <line x1="170" y1="527" x2="170" y2="547" stroke="#868e96" stroke-width="1.5"/>
  <line x1="360" y1="527" x2="360" y2="547" stroke="#868e96" stroke-width="1.5"/>
  <line x1="550" y1="527" x2="550" y2="547" stroke="#868e96" stroke-width="1.5"/>
  <line x1="170" y1="547" x2="550" y2="547" stroke="#868e96" stroke-width="1.5"/>
  <line x1="360" y1="547" x2="360" y2="567" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 다수결 다이아몬드 (y=567 ~ 623) -->
  <polygon points="360,567 430,595 360,623 290,595" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
  <text x="360" y="590" text-anchor="middle" font-size="11" font-weight="600" fill="#364fc7">다수결</text>
  <text x="360" y="606" text-anchor="middle" font-size="10" fill="#364fc7">판정</text>

  <!-- 다수결 → 클러스터 A 선택 -->
  <line x1="360" y1="623" x2="360" y2="643" stroke="#1e7b30" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 클러스터 A 답 선택 박스 (y=643, h=52) -->
  <rect x="160" y="643" width="400" height="52" rx="6"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="360" y="665" text-anchor="middle" font-size="13" font-weight="600" fill="#1e7b30">클러스터 A의 답 선택</text>
  <text x="360" y="683" text-anchor="middle" font-size="11" fill="#495057">대표 응답 추출 — 중심점에 가장 가까운 답</text>

  <!-- 종료 노드 -->
  <line x1="360" y1="695" x2="360" y2="715" stroke="#1e7b30" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <circle cx="360" cy="730" r="10" fill="#ffffff" stroke="#495057" stroke-width="2"/>
  <circle cx="360" cy="730" r="6" fill="#495057"/>

  <!-- 성능 라벨 -->
  <rect x="20" y="643" width="128" height="52" rx="4"
        fill="#dbe4ff" stroke="#364fc7" stroke-width="0.75"/>
  <text x="84" y="661" text-anchor="middle" font-size="10" font-weight="600" fill="#364fc7">50,000 DPMO</text>
  <text x="84" y="675" text-anchor="middle" font-size="10" fill="#364fc7">↓</text>
  <text x="84" y="690" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7b30">3.4 DPMO</text>
  <!-- 점선 커넥터 -->
  <line x1="148" y1="669" x2="160" y2="669" stroke="#364fc7" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 14700x 뱃지 -->
  <rect x="572" y="649" width="128" height="40" rx="4"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="0.75"/>
  <text x="636" y="666" text-anchor="middle" font-size="12" font-weight="600" fill="#1e7b30">14,700x</text>
  <text x="636" y="682" text-anchor="middle" font-size="10" fill="#495057">신뢰도 향상</text>
  <line x1="560" y1="669" x2="572" y2="669" stroke="#1e7b30" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- viewBox 최하단 확인: circle cy=730 + r=10 = 740. viewBox height=760 ✓ -->

</svg>
