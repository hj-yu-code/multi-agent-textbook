<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520"
     font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e7b30"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#364fc7"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="820" height="520" fill="#ffffff"/>

  <!-- 제목 -->
  <text x="410" y="36" text-anchor="middle" font-size="16" font-weight="700"
        fill="#212529" letter-spacing="0.5">단일 에이전트 vs 멀티에이전트 아키텍처</text>

  <!-- ========== 왼쪽 영역: 단일 에이전트 ========== -->
  <!-- 왼쪽 컨테이너 -->
  <rect x="20" y="55" width="360" height="440" rx="6"
        fill="#f5f0eb" stroke="#6b6560" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="200" y="78" text-anchor="middle" font-size="13" font-weight="600"
        fill="#6b6560">단일 에이전트</text>

  <!-- 단일 LLM 박스 (Gray) -->
  <rect x="60" y="88" width="240" height="72" rx="6" fill="#f5f0eb"/>
  <rect x="60" y="88" width="240" height="28" rx="6" fill="#6b6560"/>
  <rect x="60" y="108" width="240" height="8" fill="#6b6560"/>
  <line x1="60" y1="116" x2="300" y2="116" stroke="#6b6560" stroke-width="1"/>
  <rect x="60" y="88" width="240" height="72" rx="6" fill="none" stroke="#6b6560" stroke-width="1.5"/>
  <text x="180" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">단일 LLM</text>
  <text x="180" y="138" text-anchor="middle" font-size="11" fill="#495057">모든 작업을 단독 처리</text>
  <text x="180" y="152" text-anchor="middle" font-size="11" fill="#495057">순차 실행 전용</text>

  <!-- 화살표: 단일 LLM → 작업들 -->
  <line x1="100" y1="160" x2="100" y2="192" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="180" y1="160" x2="180" y2="192" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="160" x2="260" y2="192" stroke="#868e96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 작업 1 (Rose - 순차 병목) -->
  <rect x="48" y="192" width="96" height="52" rx="6"
        fill="#ffe3e3" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="96" y="214" text-anchor="middle" font-size="11" font-weight="600" fill="#c92a2a">작업 1</text>
  <text x="96" y="230" text-anchor="middle" font-size="10" fill="#c92a2a">순차 실행</text>
  <text x="96" y="243" text-anchor="middle" font-size="10" fill="#c92a2a">⬇ 대기</text>

  <!-- 작업 2 (Rose) -->
  <rect x="132" y="192" width="96" height="52" rx="6"
        fill="#ffe3e3" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="180" y="214" text-anchor="middle" font-size="11" font-weight="600" fill="#c92a2a">작업 2</text>
  <text x="180" y="230" text-anchor="middle" font-size="10" fill="#c92a2a">순차 실행</text>
  <text x="180" y="243" text-anchor="middle" font-size="10" fill="#c92a2a">⬇ 대기</text>

  <!-- 작업 3 (Rose) -->
  <rect x="216" y="192" width="96" height="52" rx="6"
        fill="#ffe3e3" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="264" y="214" text-anchor="middle" font-size="11" font-weight="600" fill="#c92a2a">작업 3</text>
  <text x="264" y="230" text-anchor="middle" font-size="10" fill="#c92a2a">순차 실행</text>
  <text x="264" y="243" text-anchor="middle" font-size="10" fill="#c92a2a">⬇ 대기</text>

  <!-- 3가지 한계 박스 -->
  <!-- 한계 1: 컨텍스트 -->
  <rect x="40" y="268" width="200" height="52" rx="6"
        fill="#ffe3e3" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="140" y="289" text-anchor="middle" font-size="11" font-weight="600" fill="#c92a2a">한계 1: 컨텍스트 제한</text>
  <text x="140" y="305" text-anchor="middle" font-size="10" fill="#c92a2a">200K 토큰 한계</text>
  <text x="140" y="318" text-anchor="middle" font-size="10" fill="#c92a2a">대용량 처리 불가</text>

  <!-- 한계 2: 순차 실행 -->
  <rect x="40" y="336" width="200" height="52" rx="6"
        fill="#ffe3e3" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="140" y="357" text-anchor="middle" font-size="11" font-weight="600" fill="#c92a2a">한계 2: 순차 실행 병목</text>
  <text x="140" y="373" text-anchor="middle" font-size="10" fill="#c92a2a">병렬화 불가</text>
  <text x="140" y="386" text-anchor="middle" font-size="10" fill="#c92a2a">처리 시간 누적 증가</text>

  <!-- 한계 3: 전문화 부재 -->
  <rect x="40" y="404" width="200" height="52" rx="6"
        fill="#ffe3e3" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="140" y="425" text-anchor="middle" font-size="11" font-weight="600" fill="#c92a2a">한계 3: 전문화 부재</text>
  <text x="140" y="441" text-anchor="middle" font-size="10" fill="#c92a2a">동일 모델 전담</text>
  <text x="140" y="454" text-anchor="middle" font-size="10" fill="#c92a2a">비용·품질 최적화 불가</text>

  <!-- ========== 중앙 전환 화살표 ========== -->
  <line x1="388" y1="260" x2="432" y2="260" stroke="#868e96" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="250" text-anchor="middle" font-size="10" fill="#495057">멀티에이전트로</text>
  <text x="410" y="275" text-anchor="middle" font-size="10" fill="#495057">전환</text>

  <!-- ========== 오른쪽 영역: 멀티에이전트 ========== -->
  <!-- 오른쪽 컨테이너 -->
  <rect x="440" y="55" width="360" height="440" rx="6"
        fill="#f5f0eb" stroke="#1e7b30" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="620" y="78" text-anchor="middle" font-size="13" font-weight="600"
        fill="#1e7b30">멀티에이전트</text>

  <!-- Lead Agent (Blue) -->
  <rect x="480" y="88" width="280" height="72" rx="6" fill="#f5f0eb"/>
  <rect x="480" y="88" width="280" height="28" rx="6" fill="#dbe4ff"/>
  <rect x="480" y="108" width="280" height="8" fill="#dbe4ff"/>
  <line x1="480" y1="116" x2="760" y2="116" stroke="#364fc7" stroke-width="1"/>
  <rect x="480" y="88" width="280" height="72" rx="6" fill="none" stroke="#364fc7" stroke-width="1.5"/>
  <text x="620" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#364fc7">Lead Agent (Opus)</text>
  <text x="620" y="138" text-anchor="middle" font-size="11" fill="#495057">작업 분해 · 조율 · 결과 통합</text>
  <text x="620" y="152" text-anchor="middle" font-size="11" fill="#495057">전략적 의사결정 전담</text>

  <!-- 화살표: Lead → Subagents (병렬) -->
  <line x1="543" y1="160" x2="510" y2="192" stroke="#364fc7" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="620" y1="160" x2="620" y2="192" stroke="#364fc7" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="697" y1="160" x2="730" y2="192" stroke="#364fc7" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Subagent A (Green) -->
  <rect x="458" y="192" width="104" height="64" rx="6" fill="#d3f9d8"/>
  <rect x="458" y="192" width="104" height="28" rx="6" fill="#d3f9d8"/>
  <rect x="458" y="212" width="104" height="8" fill="#d3f9d8"/>
  <line x1="458" y1="220" x2="562" y2="220" stroke="#1e7b30" stroke-width="1"/>
  <rect x="458" y="192" width="104" height="64" rx="6" fill="none" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="510" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#1e7b30">Subagent A</text>
  <text x="510" y="234" text-anchor="middle" font-size="10" fill="#1e7b30">Sonnet</text>
  <text x="510" y="248" text-anchor="middle" font-size="10" fill="#1e7b30">독립 컨텍스트</text>

  <!-- Subagent B (Green) -->
  <rect x="568" y="192" width="104" height="64" rx="6" fill="#d3f9d8"/>
  <rect x="568" y="192" width="104" height="28" rx="6" fill="#d3f9d8"/>
  <rect x="568" y="212" width="104" height="8" fill="#d3f9d8"/>
  <line x1="568" y1="220" x2="672" y2="220" stroke="#1e7b30" stroke-width="1"/>
  <rect x="568" y="192" width="104" height="64" rx="6" fill="none" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="620" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#1e7b30">Subagent B</text>
  <text x="620" y="234" text-anchor="middle" font-size="10" fill="#1e7b30">Sonnet</text>
  <text x="620" y="248" text-anchor="middle" font-size="10" fill="#1e7b30">병렬 실행</text>

  <!-- Subagent C (Green) -->
  <rect x="678" y="192" width="104" height="64" rx="6" fill="#d3f9d8"/>
  <rect x="678" y="192" width="104" height="28" rx="6" fill="#d3f9d8"/>
  <rect x="678" y="212" width="104" height="8" fill="#d3f9d8"/>
  <line x1="678" y1="220" x2="782" y2="220" stroke="#1e7b30" stroke-width="1"/>
  <rect x="678" y="192" width="104" height="64" rx="6" fill="none" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="730" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#1e7b30">Subagent C</text>
  <text x="730" y="234" text-anchor="middle" font-size="10" fill="#1e7b30">Haiku</text>
  <text x="730" y="248" text-anchor="middle" font-size="10" fill="#1e7b30">전문화 모델</text>

  <!-- 결과 반환 화살표: Subagents → Lead -->
  <line x1="510" y1="256" x2="543" y2="280" stroke="#1e7b30" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <line x1="620" y1="256" x2="620" y2="280" stroke="#1e7b30" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <line x1="730" y1="256" x2="697" y2="280" stroke="#1e7b30" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>

  <!-- 결과 통합 박스 -->
  <rect x="480" y="280" width="280" height="44" rx="6" fill="#dbe4ff" stroke="#364fc7" stroke-width="1.5"/>
  <text x="620" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#364fc7">결과 통합 (Lead Agent)</text>
  <text x="620" y="316" text-anchor="middle" font-size="10" fill="#364fc7">병렬 결과 수집 · 최종 응답 생성</text>

  <!-- 3가지 해결 박스 -->
  <!-- 해결 1: 독립 컨텍스트 -->
  <rect x="460" y="344" width="200" height="52" rx="6"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="560" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#1e7b30">해결 1: 독립 컨텍스트</text>
  <text x="560" y="381" text-anchor="middle" font-size="10" fill="#1e7b30">에이전트별 별도 컨텍스트</text>
  <text x="560" y="394" text-anchor="middle" font-size="10" fill="#1e7b30">대용량 처리 가능</text>

  <!-- 해결 2: 병렬 실행 -->
  <rect x="460" y="412" width="200" height="52" rx="6"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="560" y="433" text-anchor="middle" font-size="11" font-weight="600" fill="#1e7b30">해결 2: 병렬 실행</text>
  <text x="560" y="449" text-anchor="middle" font-size="10" fill="#1e7b30">동시 병렬 처리</text>
  <text x="560" y="462" text-anchor="middle" font-size="10" fill="#1e7b30">처리 시간 대폭 단축</text>

  <!-- 해결 3: 전문화 모델 -->
  <rect x="670" y="344" width="120" height="120" rx="6"
        fill="#d3f9d8" stroke="#1e7b30" stroke-width="1.5"/>
  <text x="730" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#1e7b30">해결 3:</text>
  <text x="730" y="384" text-anchor="middle" font-size="11" font-weight="600" fill="#1e7b30">전문화 모델</text>
  <text x="730" y="406" text-anchor="middle" font-size="10" fill="#1e7b30">작업별 최적 모델</text>
  <text x="730" y="422" text-anchor="middle" font-size="10" fill="#1e7b30">비용·품질 최적화</text>
  <text x="730" y="438" text-anchor="middle" font-size="10" fill="#1e7b30">Opus/Sonnet/Haiku</text>
  <text x="730" y="454" text-anchor="middle" font-size="10" fill="#1e7b30">역할 분리</text>
</svg>
